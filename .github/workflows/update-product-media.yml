name: Update Product Media Assets

on:
  workflow_dispatch:  # Allow manual trigger
    inputs:
      product:
        description: 'Product to update (leave empty for all)'
        required: false
        type: string
  schedule:
    # Run weekly on Sundays at 3 AM UTC to keep product media fresh
    - cron: '0 3 * * 0'

permissions:
  contents: write

jobs:
  generate-media-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate product snapshots with sections
        run: |
          node scripts/media-capture/capture-snapshot-with-sections.cjs

      - name: Run Blockchain Badges workflow
        continue-on-error: true
        run: |
          node scripts/media-capture/workflows/capture-badges-workflow.cjs --headless

      - name: Check for changes
        id: check_changes
        run: |
          git add media/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected in media assets"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected in media assets"
          fi

      - name: Commit and push media assets
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Get current date for commit message
          CURRENT_DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

          git commit -m "Update product media assets - $CURRENT_DATE

          Auto-generated by GitHub Actions workflow.

          Triggered by: ${{ github.event_name }}
          Product: ${{ inputs.product || 'all' }}
          Commit: ${{ github.sha }}"

          git push

      - name: Upload media assets as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: product-media-assets
          path: media/
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## Product Media Assets Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Product**: ${{ inputs.product || 'all' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Changes Detected**: ${{ steps.check_changes.outputs.has_changes }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # List generated media files
          echo "### Generated Media Files" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find media/ -type f -name "*.png" -o -name "*.jpg" -o -name "*.webm" 2>/dev/null | sort || echo "No media files found"
          echo '```' >> $GITHUB_STEP_SUMMARY
