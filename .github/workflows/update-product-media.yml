name: Update Product Media Assets

on:
  workflow_dispatch:  # Allow manual trigger
    inputs:
      product:
        description: 'Product to update (leave empty for all)'
        required: false
        type: string
  schedule:
    # Run weekly on Sundays at 3 AM UTC to keep product media fresh
    - cron: '0 3 * * 0'

permissions:
  contents: write

jobs:
  generate-media-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate product snapshots with sections
        run: |
          node scripts/media-capture/capture-snapshot-with-sections.cjs

      - name: Run Blockchain Badges workflow
        continue-on-error: true
        run: |
          node scripts/media-capture/workflows/capture-badges-workflow.cjs --headless

      - name: Deploy snapshots to GitBook
        run: |
          node scripts/media-capture/deploy-to-gitbook.cjs

      - name: Generate marketing blurbs
        id: generate_blurbs
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "⚠️  ANTHROPIC_API_KEY not set, skipping blurbs generation"
            echo "blurbs_generated=false" >> $GITHUB_OUTPUT
          else
            echo "Generating marketing blurbs for all products..."
            node scripts/media-capture/generate-blurbs.cjs --all
            echo "blurbs_generated=true" >> $GITHUB_OUTPUT
          fi

      - name: Check for changes
        id: check_changes
        run: |
          git add media-assets/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected in media assets"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected in media assets"
          fi

      - name: Commit and push media assets
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Get current date for commit message
          CURRENT_DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

          git commit -m "Update product media assets and blurbs - $CURRENT_DATE

          Auto-generated media snapshots and marketing blurbs.

          Triggered by: ${{ github.event_name }}
          Product: ${{ inputs.product || 'all' }}
          Commit: ${{ github.sha }}

          🤖 Generated with GitHub Actions"

          git push

      - name: Upload media assets as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: product-media-assets
          path: media-assets/
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## Product Media Assets Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Product**: ${{ inputs.product || 'all' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Changes Detected**: ${{ steps.check_changes.outputs.has_changes }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # List generated snapshots
          echo "### Generated Snapshots" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find media-assets/snapshots/ -type f -name "*.png" -o -name "*.jpg" -o -name "*.webm" 2>/dev/null | wc -l | xargs -I {} echo "Total snapshot images: {}"
          find media-assets/snapshots/ -type f -name "README.md" 2>/dev/null | wc -l | xargs -I {} echo "GitBook pages: {}"
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # List generated blurbs
          echo "### Generated Blurbs" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ -d "media-assets/blurbs" ]; then
            find media-assets/blurbs/ -type d -mindepth 1 -maxdepth 1 2>/dev/null | wc -l | xargs -I {} echo "Products with blurbs: {}"
            find media-assets/blurbs/ -type f -name "README.md" 2>/dev/null | wc -l | xargs -I {} echo "Blurb pages: {}"
            find media-assets/blurbs/ -type f -name "blurbs.json" 2>/dev/null | wc -l | xargs -I {} echo "Blurb data files: {}"
          else
            echo "Blurbs not generated (API key not configured or generation failed)"
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
